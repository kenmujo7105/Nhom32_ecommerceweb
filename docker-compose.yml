version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
    networks:
      - ecommerce_network

  server:
    image: ${SERVER_IMAGE:-ecommerce_server:latest}
    build: ./server
    container_name: ecommerce_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=${PORT:-5000}
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-your_password}
      - DB_NAME=${DB_NAME:-ecommerce_db}
      - DB_PORT=${DB_PORT:-3306}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_12345}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - VNP_TMNCODE=${VNP_TMNCODE}
      - VNP_HASHSECRET=${VNP_HASHSECRET}
      - VNP_URL=${VNP_URL}
      - VNP_RETURNURL=${VNP_RETURNURL}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - TZ=Asia/Ho_Chi_Minh

    depends_on:
      - db
    networks:
      - ecommerce_network

  client:
    image: ${CLIENT_IMAGE:-ecommerce_client:latest}
    build: ./client
    container_name: ecommerce_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - ecommerce_network

volumes:
  db_data:

networks:
  ecommerce_network:
    driver: bridge
